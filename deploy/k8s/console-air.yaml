# Console Air — Kubernetes deployment recipe for self-hosting on any cluster.
#
# Ships the app-side resources only: Namespace, Deployment, Service. There's
# deliberately no Ingress / Gateway / TLS — the right way to expose this
# Service publicly is cluster-specific, so wire up whatever you use (an
# Ingress, a Gateway API HTTPRoute, a CDN tunnel, etc.) at the hostname of
# your choice in front of the ClusterIP Service defined here.
#
# Before applying:
#   1. Build and push an image (see apps/deploy-web/Dockerfile), then
#      replace the <docker-hub-user> placeholder in the Deployment below
#      with your tag.
#   2. kubectl apply -f deploy/k8s/console-air.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: console-air
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console-air
  namespace: console-air
  labels:
    app.kubernetes.io/name: console-air
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: console-air
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console-air
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          # Pin a real version tag (e.g. matching apps/deploy-web/package.json)
          # or, even better, a digest like `…@sha256:abc…`. Don't use `:latest`
          # — with k8s's default IfNotPresent imagePullPolicy, the kubelet
          # keeps whatever was cached on the node, so subsequent pushes won't
          # land until you also bump the tag.
          image: <docker-hub-user>/console-air:<version>
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: MAINTENANCE_MODE
              value: "false"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: console-air
  namespace: console-air
  labels:
    app.kubernetes.io/name: console-air
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: console-air
  ports:
    - name: http
      port: 80
      targetPort: http
